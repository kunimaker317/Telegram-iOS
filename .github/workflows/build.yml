name: Build Telegram iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: |
          pip3 install pyaml --break-system-packages

      - name: Install Bazel 8.4.2
        run: |
          curl -L https://github.com/bazelbuild/bazel/releases/download/8.4.2/bazel-8.4.2-darwin-arm64 \
            -o /usr/local/bin/bazel
          chmod +x /usr/local/bin/bazel
          bazel --version

      - name: Create build configuration
        run: |
          cat > build_config.json << EOF
          {
            "bundle_id": "org.5eaa4afdbf16eb10.Telegram",
            "api_id": "${{ secrets.TELEGRAM_API_ID }}",
            "api_hash": "${{ secrets.TELEGRAM_API_HASH }}",
            "team_id": "5eaa4afdbf16eb10",
            "app_center_id": "0",
            "is_internal_build": "true",
            "is_appstore_build": "false",
            "appstore_id": "0",
            "app_specific_url_scheme": "tg",
            "premium_iap_product_id": "",
            "enable_siri": false,
            "enable_icloud": false
          }
          EOF

      - name: Build Telegram
        run: |
          python3 build-system/Make/Make.py \
            --bazel=/usr/local/bin/bazel \
            --overrideBazelVersion \
            --overrideXcodeVersion \
            build \
            --buildNumber=1 \
            --configuration=debug_arm64 \
            --configurationPath=build_config.json \
            --codesigningInformationPath=build-system/fake-codesigning \
            --target=Telegram

      - name: Package IPA
        run: |
          mkdir -p Payload
          APP=$(find . -name "Telegram.app" -not -path "*/bazel-*" | head -1)
          cp -r "$APP" Payload/
          zip -r Telegram.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-iOS-unsigned
          path: Telegram.ipa
          retention-days: 7
