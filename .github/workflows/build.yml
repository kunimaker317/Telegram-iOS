name: Build Telegram iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      # === ДОБАВЛЕН КЭШ BAZEL ===
      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: ${{ runner.os }}-bazel-${{ hashFiles('WORKSPACE', '**/BUILD', '**/*.bzl') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Install dependencies
        run: |
          pip3 install pyaml --break-system-packages

      - name: Install Bazel 8.4.2
        run: |
          curl -L https://github.com/bazelbuild/bazel/releases/download/8.4.2/bazel-8.4.2-darwin-arm64 \
            -o /usr/local/bin/bazel
          chmod +x /usr/local/bin/bazel
          bazel --version

      - name: Create build configuration
        run: |
          cat > build_config.json << EOF
          {
            "bundle_id": "ph.telegra.Telegraph",
            "api_id": "${{ secrets.TELEGRAM_API_ID }}",
            "api_hash": "${{ secrets.TELEGRAM_API_HASH }}",
            "team_id": "C67CF9S4VU",
            "app_center_id": "0",
            "is_internal_build": "true",
            "is_appstore_build": "false",
            "appstore_id": "0",
            "app_specific_url_scheme": "tg",
            "premium_iap_product_id": "",
            "enable_siri": false,
            "enable_icloud": false
          }
          EOF

      - name: Import Fake Certificates
        run: |
          python3 build-system/Make/ImportCertificates.py --path build-system/fake-codesigning/certs

      - name: Build Telegram
        run: |
          python3 build-system/Make/Make.py \
            --bazel=/usr/local/bin/bazel \
            --overrideBazelVersion \
            build \
            --buildNumber=1 \
            --configuration=release_arm64 \
            --configurationPath=build_config.json \
            --codesigningInformationPath=build-system/fake-codesigning \
            --target=Telegram

      # === ИСПРАВЛЕННЫЙ ШАГ УПАКОВКИ ===
      - name: Package IPA
        run: |
          mkdir -p Payload
          # Ищем строго в папке bazel-bin, куда Bazel складывает результат
          APP=$(find bazel-bin -type d -name "Telegram.app" | head -1)
          echo "Found Telegram.app at: $APP"
          cp -r "$APP" Payload/
          zip -r Telegram.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-iOS-unsigned
          path: Telegram.ipa
          retention-days: 7
