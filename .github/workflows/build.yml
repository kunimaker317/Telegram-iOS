name: Build Telegram iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 180

    env:
      USE_BAZEL_VERSION: "8.4.2"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: |
          brew install bazelisk
          pip3 install pyaml --break-system-packages

      - name: Create build configuration
        run: |
          cat > build_config.json << EOF
          {
            "bundle_id": "org.telegram.Telegram-iOS",
            "api_id": "${{ secrets.TELEGRAM_API_ID }}",
            "api_hash": "${{ secrets.TELEGRAM_API_HASH }}",
            "team_id": "",
            "app_center_id": "0",
            "is_internal_build": "true",
            "is_appstore_build": "false",
            "appstore_id": "0",
            "app_specific_url_scheme": "tg",
            "premium_iap_product_id": "",
            "enable_siri": false,
            "enable_icloud": false
          }
          EOF

      - name: Build Telegram
        run: |
          python3 build-system/Make/Make.py \
            --bazel=$(which bazelisk) \
            --overrideBazelVersion \
            build \
            --buildNumber=1 \
            --configuration=release_arm64 \
            --configurationPath=build_config.json \
            --xcodeManagedCodesigning \
            --target=Telegram

      - name: Package IPA
        run: |
          mkdir -p Payload
          APP=$(find . -name "Telegram.app" -not -path "*/bazel-*" | head -1)
          cp -r "$APP" Payload/
          zip -r Telegram.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-iOS-unsigned
          path: Telegram.ipa
          retention-days: 7
