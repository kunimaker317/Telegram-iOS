name: Build Telegram iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      # === ДОБАВЛЕН КЭШ BAZEL ===
      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: ${{ runner.os }}-bazel-${{ hashFiles('WORKSPACE', '**/BUILD', '**/*.bzl') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Install dependencies
        run: |
          pip3 install pyaml --break-system-packages

      - name: Install Bazel 8.4.2
        run: |
          curl -L https://github.com/bazelbuild/bazel/releases/download/8.4.2/bazel-8.4.2-darwin-arm64 \
            -o /usr/local/bin/bazel
          chmod +x /usr/local/bin/bazel
          bazel --version

      - name: Create build configuration
        run: |
          cat > build_config.json << EOF
          {
            "bundle_id": "ph.telegra.Telegraph",
            "api_id": "${{ secrets.TELEGRAM_API_ID }}",
            "api_hash": "${{ secrets.TELEGRAM_API_HASH }}",
            "team_id": "U5X7796Z97",
            "app_center_id": "0",
            "is_internal_build": "true",
            "is_appstore_build": "false",
            "appstore_id": "0",
            "app_specific_url_scheme": "tg",
            "premium_iap_product_id": "",
            "enable_siri": false,
            "enable_icloud": false
          }
          EOF

      - name: Import Fake Certificates
        run: |
          python3 build-system/Make/ImportCertificates.py --path build-system/fake-codesigning/certs

      - name: Build Telegram
        run: |
          python3 build-system/Make/Make.py \
            --bazel=/usr/local/bin/bazel \
            --overrideBazelVersion \
            build \
            --buildNumber=1 \
            --configuration=release_arm64 \
            --configurationPath=build_config.json \
            --codesigningInformationPath=build-system/fake-codesigning \
            --target=Telegram

      # === ИСПРАВЛЕННЫЙ ШАГ УПАКОВКИ ===
      - name: Package IPA (Bulletproof)
        run: |
          mkdir -p Payload
          
          echo "🔍 Начинаем поиск Telegram.app..."
          
          # СПОСОБ 1: Прямой путь (самый вероятный)
          if [ -d "bazel-bin/Telegram/Telegram.app" ]; then
            echo "✅ Нашел по прямому пути!"
            APP_PATH="bazel-bin/Telegram/Telegram.app"
          
          # СПОСОБ 2: Поиск внутри bazel-bin с переходом по ссылкам
          else
            echo "⚠️ Прямой путь пуст. Ищу поиском в bazel-bin..."
            APP_PATH=$(find -L bazel-bin -maxdepth 4 -name "Telegram.app" -type d | head -1)
          fi
          
          # СПОСОБ 3: Поиск вообще везде (если первые два не сработали)
          if [ -z "$APP_PATH" ]; then
             echo "⚠️ В bazel-bin пусто. Ищу вообще везде (это может занять время)..."
             APP_PATH=$(find . -maxdepth 10 -name "Telegram.app" -type d | grep -v "Source" | grep -v "bazel-Telegram" | head -1)
          fi

          # ФИНАЛ: Проверка
          if [ -n "$APP_PATH" ]; then
            echo "🎉 УРА! Приложение найдено здесь: $APP_PATH"
            cp -r "$APP_PATH" Payload/
            zip -r Telegram.ipa Payload/
          else
            echo "❌ КАТАСТРОФА. Файл не найден."
            echo "📂 Вывожу структуру папок, чтобы понять, где он:"
            # Эта команда покажет нам, какие папки есть, если всё сломается
            find bazel-bin -maxdepth 3 -type d
            exit 1
          fi
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-iOS-unsigned
          path: Telegram.ipa
          retention-days: 7
