name: Build Telegram iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: |
          brew install bazelisk
          pip3 install pyaml --break-system-packages

      - name: Inspect build system
        run: |
          echo "=== Make.py build help ==="
          python3 build-system/Make/Make.py build --help
          echo "=== Repo root files ==="
          ls -la
          echo "=== build-system contents ==="
          ls -la build-system/
          echo "=== Looking for config examples ==="
          find . -name "*.json" -path "*/buildbox/*" 2>/dev/null | head -20
          find . -name "*.yaml" -path "*/build*" 2>/dev/null | head -20

      - name: Create build configuration
        run: |
          mkdir -p build_config
          cat > build_config/variables.json << 'EOF'
          {
            "bundleId": "org.telegram.Telegram-iOS",
            "appGroupId": "group.org.telegram.Telegram-iOS",
            "keychainGroup": "com.apple.security.application-groups"
          }
          EOF

      - name: Build Telegram
        run: |
          python3 build-system/Make/Make.py \
            --bazel=$(which bazelisk) \
            --apiId=${{ secrets.TELEGRAM_API_ID }} \
            --apiHash=${{ secrets.TELEGRAM_API_HASH }} \
            build \
            --buildNumber=1 \
            --configuration=release_arm64 \
            --configurationPath=build_config \
            --xcodeManagedCodesigning \
            --target=Telegram

      - name: Package IPA
        run: |
          mkdir -p Payload
          APP=$(find . -name "Telegram.app" -not -path "*/bazel-*" | head -1)
          cp -r "$APP" Payload/
          zip -r Telegram.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-iOS-unsigned
          path: Telegram.ipa
          retention-days: 7
