name: Build Telegram iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: |
          brew install bazelisk
          pip3 install pyaml

      - name: Build Telegram
        run: |
          python3 build-system/Make/Make.py \
            --bazel=$(which bazelisk) \
            --configuration=release_arm64 \
            --apiId=${{ secrets.TELEGRAM_API_ID }} \
            --apiHash=${{ secrets.TELEGRAM_API_HASH }} \
            build \
            --target=Telegram

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r $(find . -name "Telegram.app" -not -path "*/bazel-*" | head -1) Payload/
          zip -r Telegram.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-iOS-unsigned
          path: Telegram.ipa
          retention-days: 7
