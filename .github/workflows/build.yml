name: Build Telegram iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: |
          brew install bazelisk
          pip3 install pyaml --break-system-packages

      - name: Show config template
        run: |
          echo "=== template_minimal ==="
          cat build-system/template_minimal_development_configuration.json
          echo "=== appstore config ==="
          cat build-system/appstore-configuration.json
          echo "=== buildbox ==="
          ls -la buildbox/
          cat buildbox/*.json 2>/dev/null || true

      - name: Build Telegram
        run: |
          python3 build-system/Make/Make.py \
            --bazel=$(which bazelisk) \
            build \
            --buildNumber=1 \
            --configuration=release_arm64 \
            --configurationPath=build-system/template_minimal_development_configuration.json \
            --xcodeManagedCodesigning \
            --target=Telegram

      - name: Package IPA
        run: |
          mkdir -p Payload
          APP=$(find . -name "Telegram.app" -not -path "*/bazel-*" | head -1)
          cp -r "$APP" Payload/
          zip -r Telegram.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-iOS-unsigned
          path: Telegram.ipa
          retention-days: 7
